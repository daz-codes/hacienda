persistence:
  tables:
    - hacienda_jobs
    - hacienda_job_outbox
    - hacienda_job_workers
    - hacienda_job_queues
    - hacienda_outbox
    - hacienda_recurring_runs
    - hacienda_sessions
  payload_keys: [args, kwargs, __hacienda_type__]

