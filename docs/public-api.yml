  - db/migrations/20260629000000_create_hacienda_runtime.rb
  - db/seeds.rb
  - public/assets/HELIUM-LICENSE.txt
  - public/assets/IDIOMORPH-LICENSE.txt
  - public/assets/application.css
  - public/assets/hacienda-navigation.js
  - public/assets/helium-csp-sse.js
  - public/assets/helium-csp.js
  - public/assets/helium-sse.js
  - public/assets/helium.js
  - public/assets/idiomorph.esm.js
  - public/assets/jexpr.js
