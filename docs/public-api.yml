    - lunula_jobs
    - lunula_job_outbox
    - lunula_job_workers
    - lunula_job_queues
    - lunula_outbox
    - lunula_recurring_runs
    - lunula_sessions
  payload_keys: [args, kwargs, __lunula_type__]

