navigation_protocol:
  headers: [X-Hacienda-Navigation, X-Hacienda-Prefetch]
  attributes:
    - data-hacienda-active-prefix
    - data-hacienda-navigating
    - data-hacienda-navigation
    - data-hacienda-permanent
    - data-hacienda-prefetch
  paths: [/hac/jobs, /hac/jobs/health]
  events:
    - hacienda:before-navigate
    - hacienda:navigation-start
    - hacienda:before-morph
    - hacienda:load
    - hacienda:navigation-error
    - hacienda:navigation-end
    - hacienda:invalidate
