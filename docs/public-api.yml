browser_protocol:
  headers: [X-Morpheus-Navigation, X-Morpheus-Prefetch]
  attributes:
    - data-morpheus-active-prefix
    - data-morpheus-navigating
    - data-morpheus
    - data-morpheus-permanent
    - data-morpheus-prefetch
  events:
    - morpheus:before-navigate
    - morpheus:navigation-start
    - morpheus:before-morph
    - morpheus:load
    - morpheus:navigation-error
    - morpheus:navigation-end
    - morpheus:invalidate

development_endpoints: [/luna/jobs, /luna/jobs/health, /luna/mail]
