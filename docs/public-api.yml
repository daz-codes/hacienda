schema: 1
framework_version: 0.1.0

ruby:
  Lunula:
    singleton_methods:
      - app_host
      - app_url
      - cache
      - cancel_job
      - clear_enqueued_jobs
      - clear_mail_deliveries
      - configure_cache
      - configure_jobs
      - configure_logger
      - configure_mail
      - configure_storage
      - credentials
      - enqueue
      - enqueue_all
      - enqueue_at
      - enqueue_in
      - enqueued_jobs
      - env
      - env=
      - job_adapter
      - job_outbox
      - logger
      - mail
      - mail_deliveries
      - perform_enqueued_jobs
      - reload
      - reload=
      - root
      - root=
      - shutdown_jobs
      - signed_token
      - storage
  Lunula::Application:
    instance_methods: [call, reload!, transaction, database, events, cache, storage, routes]
  Lunula::Actions:
    singleton_methods: [action_methods, action?, validate!]
    instance_methods: [dispatch]
  Lunula::Assets:
    singleton_methods: [precompile, clobber, path, rack_options, manifest]
  Lunula::Attributes:
    instance_methods: [assign, attributes, changed?, changed_attribute_names, changed_attributes, changes, attribute_was, persisted?]
  Lunula::Attributes::ClassMethods:
    instance_methods: [attribute, attributes, attribute_definitions, from_persistence]
  Lunula::Cache:
    instance_methods: [read, write, fetch, delete, clear, expand_key]
  Lunula::Cache::MemoryStore:
    instance_methods: [read, write, delete, clear, size]
  Lunula::Cache::NullStore:
    instance_methods: [read, write, delete, clear]
  Lunula::Cache::HTTP:
    singleton_methods: [headers, fresh?, etag_header]
  Lunula::Context:
    instance_methods: [request, session, cookies, flash, current_user, current_user=, csrf_token, cache, storage, transaction, navigation_request?, prefetch?, navigation_reload!, stale?]
  Lunula::Credentials:
    singleton_methods: [generate_key]
    instance_methods: [read_text, write_text, to_h, fetch, dig, rotate]
  Lunula::Environment:
    instance_methods: [name, development?, test?, production?]
  Lunula::Migrations:
    singleton_methods: [pending, current?, migration_files]
  Lunula::Events:
    instance_methods: [configure, configured?, subscribe, unsubscribe, publish, subscriptions, reload!]
  Lunula::Events::Recorder:
    instance_methods: [call, events, clear]
  Lunula::Events::Outbox:
    instance_methods: [write, dispatch_once, failed, retry_failed, pending_count]
  Lunula::Flash:
    instance_methods: ['[]', '[]=', now, each, any?, to_h]
  Lunula::HTML:
    singleton_methods: [escape, safe]
  Lunula::Jobs::Adapter:
    singleton_methods: [validate!, capabilities, supports?, durable?, external?, transactional_with?, requires_outbox?]
  Lunula::Jobs::Adapters::Inline:
    singleton_methods: [enqueue, capabilities]
  Lunula::Jobs::Adapters::Async:
    instance_methods: [enqueue, capabilities, shutdown]
  Lunula::Jobs::Adapters::Test:
    singleton_methods: [enqueue, capabilities, enqueued_jobs, perform_enqueued_jobs, clear]
  Lunula::Jobs::Adapters::Database:
    instance_methods: [enqueue, enqueue_all, work_once, claim_many, pending, running, scheduled, completed, discarded, failed, retry_failed, cancel, discard, reschedule, pause_queue, resume_queue, status, health, prune]
  Lunula::Jobs::Worker:
    instance_methods: [run, work_once, stop, stopping?]
  Lunula::Jobs::Outbox:
    instance_methods: [write, dispatch_once, failed, retry_failed, pending_count, scheduled]
  Lunula::Jobs::RecurringSchedule:
    singleton_methods: [load, set_enabled]
    instance_methods: [entries, enabled_entries, find, due_at]
  Lunula::Jobs::RecurringScheduler:
    instance_methods: [run, tick, trigger, stop, stopping?]
  Lunula::Mailer::Inbox:
    instance_methods: [call]
  Lunula::Middleware::CSRF:
    instance_methods: [call]
  Lunula::Middleware::HostAuthorization:
    instance_methods: [call]
  Lunula::Middleware::PendingMigrations:
    instance_methods: [call]
  Lunula::Middleware::RateLimiter:
    instance_methods: [call]
  Lunula::Middleware::RequestLogger:
    instance_methods: [call]
  Lunula::Middleware::RequestLimits:
    instance_methods: [call]
  Lunula::Middleware::SecurityHeaders:
    instance_methods: [call]
  Lunula::Middleware::StorageFiles:
    instance_methods: [call]
  Lunula::Params:
    instance_methods: ['[]', fetch, dig, key?, slice, permit, require, to_h]
  Lunula::Response:
    instance_methods: [finish, status, headers, body]
  Lunula::Responses:
    instance_methods: [render, redirect, json, text, response]
  Lunula::Routes:
    instance_methods: [get, post, put, patch, delete, guard]
  Lunula::SessionStore:
    singleton_methods: [create_table]
    instance_methods: [prune_expired, revoke]
  Lunula::SignedToken:
    instance_methods: [generate, verify]
  Lunula::SQLite:
    singleton_methods: [configure, check, checkpoint, sqlite?, busy_error?]
  Lunula::Storage:
    instance_methods: [store, open, read, delete, exist?, url, local?, public_path]
  Lunula::Storage::Upload:
    singleton_methods: [present?, wrap]
    instance_methods: [validate!, read_prefix, checksum, filename, content_type, byte_size]
  Lunula::Storage::ContentTypeInspector:
    instance_methods: [call]
  Lunula::Storage::DiskService:
    instance_methods: [write, open, delete, exist?, url, local?]
  Lunula::Storage::MemoryService:
    instance_methods: [write, open, delete, exist?, url, local?]
  Lunula::Storage::NullService:
    instance_methods: [write, open, delete, exist?, url, local?]
  Lunula::Store:
    instance_methods: [dataset, all, first, find, load, save, delete, refresh]
  Lunula::Repository:
    instance_methods: [all, first, find, find_by, find_by!, save, delete, load, refresh, dataset]
  Lunula::Transaction:
    instance_methods: [emit, enqueue, enqueue_all, enqueue_in, enqueue_at]
  Lunula::ValidationErrors:
    instance_methods: [add, '[]', each, any?, empty?, clear, full_messages, to_a]
  Lunula::Validations:
    instance_methods: [errors, valid?, invalid?]
  Lunula::View:
    instance_methods: [name, locals, status, layout]

exceptions:
  - Lunula::Error
  - Lunula::NotFound
  - Lunula::BadRequest
  - Lunula::PayloadTooLarge
  - Lunula::RequestLimitExceeded
  - Lunula::Routes::CollisionError
  - Lunula::Assets::Error
  - Lunula::UnsafeRedirect
  - Lunula::Store::StaleObject
  - Lunula::Jobs::Error
  - Lunula::Jobs::TimeoutError
  - Lunula::Jobs::CancelledError
  - Lunula::Storage::InvalidUpload
  - Lunula::Storage::TooLarge
  - Lunula::Storage::UnsupportedType
  - Lunula::Storage::InvalidContent

cli:
  executables: [luna]
  commands:
    - new APP_NAME
    - generate domain NAME
    - generate rest NAME
    - generate action DOMAIN NAME
    - generate migration NAME
    - generate auth
    - credentials:show
    - credentials:edit
    - credentials:rotate
    - start
    - console
    - routes
    - db:migrate
    - db:rollback
    - db:seed
    - db:check
    - db:checkpoint
    - assets:precompile
    - assets:clobber
    - jobs:work
    - jobs:status
    - jobs:health
    - jobs:benchmark
    - jobs:list
    - jobs:failed
    - jobs:scheduled
    - jobs:prune
    - jobs:pause
    - jobs:resume
    - jobs:schedule
    - jobs:recurring
    - jobs:cancel
    - jobs:discard
    - jobs:reschedule
    - jobs:retry

